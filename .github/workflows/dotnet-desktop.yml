name: .NET Core Desktop

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  build:

    strategy:
      matrix:
        configuration: [Debug, Release]

    runs-on: windows-latest

    env:
      Solution_Name: HermesProxy.sln

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 6.0.x

    - name: Restore the application
      run: dotnet restore $env:Solution_Name

    - name: Build
      run: dotnet build $env:Solution_Name --configuration ${{ matrix.configuration }} --no-restore

    - name: Publish
      run: dotnet publish HermesProxy/HermesProxy.csproj --configuration ${{ matrix.configuration }} --use-current-runtime -p:UsePublishBuildSettings=true --no-build

    - name: Copy files
      run: |
        Copy-Item -Path "HermesProxy/bin/${{ matrix.configuration }}/*/publish/*" -Destination "publish" -Recurse -Force
      shell: pwsh

    - name: Zip artifact
      run: Compress-Archive -Path publish/* -DestinationPath HermesProxy-windows-${{ matrix.configuration }}.zip
      shell: pwsh

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: HermesProxy-windows-${{ matrix.configuration }}-${{ github.sha }}
        path: publish
        if-no-files-found: error

    - name: Upload zip for release
      uses: actions/upload-artifact@v4
      with:
        name: release-zip-${{ matrix.configuration }}
        path: HermesProxy-windows-${{ matrix.configuration }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: write

    steps:
    - name: Download Release artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: release-zip-*
        merge-multiple: true

    - name: Generate tag
      id: tag
      run: echo "tag=build-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.tag }}
        name: Build ${{ steps.tag.outputs.tag }}
        body: |
          Automated build from commit ${{ github.sha }}
        files: |
          HermesProxy-windows-Debug.zip
          HermesProxy-windows-Release.zip
        draft: false
        prerelease: false
